---
---

@import "minima/skins/dark";
@import "minima/initialize";

/* 전체 폰트 & 배경 */
body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  background-color: #0d1117;
  color: #e6edf3;
}

/* 헤더 */
.site-header {
  background-color: #161b22;
  border-bottom: 1px solid #21262d;
  padding: 16px 0;
}

.site-title {
  font-size: 22px;
  font-weight: 700;
  color: #58a6ff !important;
  letter-spacing: -0.5px;
}

.site-nav .page-link {
  color: #8b949e;
}

.site-nav .page-link:hover {
  color: #58a6ff;
}

/* 메인 콘텐츠 */
.page-content {
  padding: 40px 0;
}

/* 글 목록 카드 */
.post-list {
  list-style: none;
  margin-left: 0;
}

.post-list li {
  background: #161b22;
  border: 1px solid #21262d;
  border-radius: 10px;
  padding: 24px 28px;
  margin-bottom: 16px;
  transition: border-color 0.2s;
}

.post-list li:hover {
  border-color: #58a6ff;
}

.post-list h3 {
  margin-bottom: 8px;
}

.post-list h3 a {
  font-size: 18px;
  font-weight: 600;
  color: #e6edf3 !important;
  text-decoration: none;
}

.post-list h3 a:hover {
  color: #58a6ff !important;
}

.post-meta {
  font-size: 13px;
  color: #8b949e;
}

/* 글 상세 페이지 */
.post-header {
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid #21262d;
}

.post-title {
  font-size: 28px;
  font-weight: 700;
  color: #e6edf3;
  line-height: 1.3;
}

.post-content h2 {
  font-size: 22px;
  color: #58a6ff;
  margin-top: 36px;
  padding-bottom: 8px;
  border-bottom: 1px solid #21262d;
}

.post-content h3 {
  font-size: 18px;
  color: #79c0ff;
  margin-top: 24px;
}

.post-content p {
  line-height: 1.8;
  color: #c9d1d9;
}

.post-content a {
  color: #58a6ff;
}

.post-content code {
  background: #161b22;
  border: 1px solid #21262d;
  border-radius: 4px;
  padding: 2px 6px;
  font-size: 13px;
  color: #ff7b72;
}

.post-content pre {
  background: #161b22;
  border: 1px solid #21262d;
  border-radius: 8px;
  padding: 20px;
}

/* 푸터 */
.site-footer {
  background-color: #161b22;
  border-top: 1px solid #21262d;
  color: #8b949e;
  font-size: 13px;
}

/* 광고 영역 */
.ad-container {
  background: #161b22;
  border: 1px dashed #21262d;
  border-radius: 8px;
  padding: 20px;
  text-align: center;
  margin: 24px 0;
  color: #8b949e;
  font-size: 13px;
}
