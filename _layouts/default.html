<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
{% if page.description %}<meta name="description" content="{{ page.description }}">{% endif %}
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5670639006214542" crossorigin="anonymous"></script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4DPPP2LE42"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-4DPPP2LE42');</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#f7f8fc;color:#1a1a2e;line-height:1.8}
header{background:#fff;border-bottom:1px solid #eee;position:sticky;top:0;z-index:100}
.header-inner{max-width:1100px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:20px;font-weight:700;color:#111;text-decoration:none;display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
nav a{color:#555;text-decoration:none;font-size:14px;font-weight:500;margin-left:24px}
nav a:hover{color:#6366f1}
.main-wrap{max-width:1100px;margin:0 auto;padding:32px 24px 64px}
.banner-ad{background:#fff;border:1.5px dashed #d1d5db;border-radius:12px;padding:18px;text-align:center;color:#9ca3af;font-size:13px;margin-bottom:28px}
.post-list{list-style:none;display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
@media(max-width:900px){.post-list{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.post-list{grid-template-columns:1fr}.header-inner{padding:0 16px}.main-wrap{padding:24px 16px 48px}}
.post-list li{background:#fff;border:1px solid #f0f0f0;border-radius:16px;overflow:hidden;transition:all .2s}
.post-list li:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.1);border-color:#6366f1}
.post-thumbnail{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
.post-thumbnail-placeholder{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#e0e7ff,#ede9fe);display:flex;align-items:center;justify-content:center;font-size:40px}
.post-body{padding:16px 18px 20px}
.post-tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:10px}
.cat-news{background:#fef2f2;color:#ef4444}
.cat-info{background:#eef2ff;color:#6366f1}
.cat-story{background:#f0fdf4;color:#16a34a}
.post-list h3{font-size:15px;font-weight:700;color:#111;line-height:1.5;margin-bottom:8px}
.post-list h3 a{color:#111;text-decoration:none}
.post-list h3 a:hover{color:#6366f1}
.post-list .meta{font-size:12px;color:#d1d5db;display:flex;justify-content:space-between;margin-bottom:6px}
.post-list .desc{font-size:13px;color:#6b7280;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.post-article{max-width:760px}
.post-article .post-tag{margin-bottom:12px}
.post-article h1{font-size:28px;font-weight:700;color:#111;line-height:1.4;margin-bottom:12px}
.post-article .meta{font-size:13px;color:#9ca3af;margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid #f0f0f0;display:flex;gap:16px}
.post-article .content{font-size:16px;color:#374151;line-height:1.95}
.post-article .content img{width:100%;border-radius:14px;margin:28px 0;display:block}
.post-article .content h2{font-size:21px;font-weight:700;color:#111;margin-top:42px;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #f5f5f5}
.post-article .content h3{font-size:18px;font-weight:600;color:#374151;margin-top:28px;margin-bottom:10px}
.post-article .content p{margin-bottom:16px}
.post-article .content a{color:#6366f1}
.post-article .content blockquote{border-left:3px solid #6366f1;background:#eef2ff;margin:20px 0;padding:14px 20px;border-radius:0 8px 8px 0;color:#4b5563}
.post-article .content code{background:#f5f5f5;padding:2px 6px;border-radius:4px;font-size:14px;color:#6366f1}
.post-article .content pre{background:#f8f8f8;border-radius:8px;padding:20px;overflow-x:auto}
footer{background:#fff;border-top:1px solid #f0f0f0;padding:24px;text-align:center;font-size:13px;color:#9ca3af}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a class="logo" href="{{ '/' | relative_url }}">
      <div class="logo-icon">💻</div>
      {{ site.title }}
    </a>
    <nav>
      <a href="{{ '/' | relative_url }}">홈</a>
      <a href="{{ '/about/' | relative_url }}">소개</a>
      <a href="{{ '/privacy/' | relative_url }}">개인정보처리방침</a>
    </nav>
  </div>
</header>
{{ content }}
<footer>© 2026 {{ site.title }} · 매일 업데이트되는 최신 IT 정보</footer>
</body>
</html>
